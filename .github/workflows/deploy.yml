name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/team/oliver

            # Pull latest changes
            git pull origin main

            # Install dependencies (solo si cambió package.json)
            npm ci

            # Build
            npm run build

            # Reiniciar sin downtime
            pm2 restart team-oliver

            echo "Deploy completado: $(date)"
