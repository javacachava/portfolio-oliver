name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -eu
            cd /var/www/team/oliver

            # Pull latest changes
            git pull origin main

            # Install dependencies (solo si cambió package.json)
            npm ci --ignore-scripts

            # Build
            npm run build

            # Reiniciar sin downtime
            pm2 restart team-oliver

            # Ocultar la versión exacta de Nginx en las respuestas públicas.
            install -d -m 755 /etc/nginx/conf.d
            printf 'server_tokens off;\n' > /etc/nginx/conf.d/00-server-tokens.conf
            nginx -t && systemctl reload nginx

            echo "Deploy completado: $(date)"
