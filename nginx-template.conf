# ============================================================
# Template para agregar un proyecto nuevo al VPS
# Copiar este bloque a /etc/nginx/sites-available/nombre-proyecto
# Cambiar: server_name, proxy_pass puerto, logs
# ============================================================

# Puertos ya usados:
#   3000  →  oliver-portfolio   (oliver.wuju.dev)
#   3001  →  reservado          (wuju.dev landing, cuando exista)
#   3002  →  pizzabrava-pos     (pos.wuju.dev)
#   3003  →  tuguiasv-api       (api.wuju.dev)
#   3004  →  chismecito         (chismecito.wuju.dev)
#   3005+ →  proyectos futuros

server {
    listen 80;
    server_name SUBDOMINIO.wuju.dev;   # <-- cambiar

    access_log /var/log/nginx/wuju/SUBDOMINIO-access.log;
    error_log  /var/log/nginx/wuju/SUBDOMINIO-error.log;

    location / {
        proxy_pass         http://localhost:PUERTO;   # <-- cambiar puerto
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Despues de crear el archivo:
#   ln -s /etc/nginx/sites-available/nombre /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d SUBDOMINIO.wuju.dev
